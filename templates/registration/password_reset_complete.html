{% extends "auth_base.html" %}
{% block title %}Password Reset Complete | Sky Portal{% endblock %}

{% block content %}
<div class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">
            <div class="auth-logo-icon">☰</div>
        </div>

        <h2 class="auth-title">Password Reset Complete</h2>
        <p class="auth-subtitle">
            Your password has been updated successfully. You can now sign in.
        </p>

        <a href="{% url 'login' %}" class="auth-btn" style="display: inline-flex; justify-content: center; align-items: center; text-decoration: none;">
            Sign In
        </a>

    </div>

</div>
{% endblock %}
