{% extends "base.html" %}

{% block title %}Logged Out | Sky Engineering Portal{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card sky-info-card">
            <div class="card-body p-5 text-center">
                <h1 class="page-title mb-3" style="font-size: 2.3rem;">Logged Out</h1>
                <p class="page-subtitle mb-4">
                    You have been successfully logged out of the system.
                </p>

                <div class="d-flex justify-content-center gap-2 flex-wrap">
                    <a href="{% url 'login' %}" class="btn btn-sky-primary px-4">
                        Login Again
                    </a>
                    <a href="/admin/" class="btn btn-sky-secondary px-4">
                        Admin
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
