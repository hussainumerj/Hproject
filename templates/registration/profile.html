{% extends "base.html" %}

{% block title %}My Profile | Sky Engineering Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">

        <div class="card sky-info-card">
            <div class="card-body p-5">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
                    <div>
                        <h1 class="page-title mb-2" style="font-size: 2.2rem;">My Profile</h1>
                        <p class="page-subtitle mb-0">Manage your account details</p>
                    </div>

                    <a href="{% url 'password_change' %}" class="btn btn-sky-secondary">
                        Change Password
                    </a>
                </div>

                {% if success %}
                    <div class="alert alert-success rounded-4 mb-4">
                        Profile updated successfully.
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="id_first_name" class="form-label fw-semibold">First Name</label>
                            <input
                                type="text"
                                name="first_name"
                                id="id_first_name"
                                class="form-control sky-search-input"
                                value="{{ request.user.first_name|default:'' }}"
                                placeholder="Enter first name"
                            >
                        </div>

                        <div class="col-md-6">
                            <label for="id_last_name" class="form-label fw-semibold">Last Name</label>
                            <input
                                type="text"
                                name="last_name"
                                id="id_last_name"
                                class="form-control sky-search-input"
                                value="{{ request.user.last_name|default:'' }}"
                                placeholder="Enter last name"
                            >
                        </div>

                        <div class="col-md-6">
                            <label for="id_username" class="form-label fw-semibold">Username</label>
                            <input
                                type="text"
                                name="username"
                                id="id_username"
                                class="form-control sky-search-input"
                                value="{{ request.user.username }}"
                                placeholder="Enter username"
                                required
                            >
                        </div>

                        <div class="col-md-6">
                            <label for="id_email" class="form-label fw-semibold">Email</label>
                            <input
                                type="email"
                                name="email"
                                id="id_email"
                                class="form-control sky-search-input"
                                value="{{ request.user.email|default:'' }}"
                                placeholder="Enter email"
                            >
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap mt-4">
                        <button type="submit" class="btn btn-sky-primary">
                            Save Changes
                        </button>
                        <a href="{% url 'team_list' %}" class="btn btn-sky-secondary">
                            Back to Teams
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
