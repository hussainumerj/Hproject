{% extends "auth_base.html" %}
{% block title %}Change Password | Sky Portal{% endblock %}

{% block content %}
<div class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">
            <div class="auth-logo-icon">☰</div>
        </div>

        <h2 class="auth-title">Change Password</h2>
        <p class="auth-subtitle">Update your account password</p>

        <form method="post">
            {% csrf_token %}

            <div class="auth-group">
                <label>Current Password</label>
                <div class="auth-input-wrapper">
                    <input type="password" name="old_password" required>
                </div>
            </div>

            <div class="auth-group">
                <label>New Password</label>
                <div class="auth-input-wrapper">
                    <input type="password" name="new_password1" required>
                </div>
            </div>

            <div class="auth-group">
                <label>Confirm New Password</label>
                <div class="auth-input-wrapper">
                    <input type="password" name="new_password2" required>
                </div>
            </div>

            <button type="submit" class="auth-btn">Change Password</button>

        </form>

        <div class="auth-footer">
            <a href="{% url 'profile' %}">Back to profile</a>
        </div>

    </div>

</div>
{% endblock %}
